    </filter>
  </defs>
  <text x="120" y="112" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="126" font-weight="700" letter-spacing="-10" fill="url(#goldFill)" stroke="url(#goldStroke)" stroke-width="2.6" filter="url(#goldShadow)">50</text>

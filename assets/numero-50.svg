<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">50 años</title>
  <desc id="desc">Sello elegante en tonos grises para una invitación de 50 años.</desc>
  <defs>
    <radialGradient id="ringGlow" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#f7f7f7" stop-opacity="0.26"/>
      <stop offset="55%" stop-color="#b5bac1" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#51565d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#d9dde2"/>
      <stop offset="55%" stop-color="#9da3ab"/>
      <stop offset="100%" stop-color="#f4f5f7"/>
    </linearGradient>
    <linearGradient id="metalSoft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f9fafb"/>
      <stop offset="100%" stop-color="#8b9199"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="none"/>
  <circle cx="400" cy="400" r="310" fill="url(#ringGlow)"/>
  <circle cx="400" cy="400" r="250" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)" stroke-width="6"/>
  <circle cx="400" cy="400" r="214" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
  <g filter="url(#shadow)">
    <circle cx="400" cy="400" r="176" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <text x="400" y="445" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="240" font-weight="700" fill="url(#metal)" letter-spacing="-18">50</text>
    <text x="400" y="530" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="42" font-weight="700" fill="url(#metalSoft)" letter-spacing="10">AÑOS</text>
  </g>
</svg>
